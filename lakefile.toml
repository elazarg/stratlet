name = "formal"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["distilled"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.27.0"

[[require]]
name = "GameTheory"
path = "../GameTheory"

[[lean_lib]]
name = "Vegas"

[[lean_lib]]
name = "distilled"
roots = ["distilled"]
